version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-kitchen-api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - cloud-kitchen
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:80"
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_DATABASE=cloud_kitchen
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis

  mysql:
    image: mysql:8.0
    container_name: cloud-kitchen-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cloud_kitchen
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/mysql.cnf
    ports:
      - "3306:3306"
    networks:
      - cloud-kitchen

  redis:
    image: redis:7-alpine
    container_name: cloud-kitchen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud-kitchen

  nginx:
    image: nginx:alpine
    container_name: cloud-kitchen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - cloud-kitchen

  supervisor:
    image: php:8.2-apache
    container_name: cloud-kitchen-supervisor
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/supervisor.conf:/etc/supervisor/conf.d/supervisor.conf
    networks:
      - cloud-kitchen
    depends_on:
      - mysql
      - redis
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisor.conf"]

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  cloud-kitchen:
    driver: bridge
